<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minishell Pipeline Training</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: #0d1117;
    color: #c9d1d9;
    min-height: 100vh;
    padding: 1.5rem;
  }
  h1 { color: #58a6ff; margin-bottom: 0.3rem; font-size: 1.5rem; }
  .subtitle { color: #8b949e; margin-bottom: 1.2rem; font-size: 0.85rem; }

  /* Stage pills (top bar) */
  .stage-bar { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .stage-pill {
    padding: 0.55rem 1.1rem;
    background: #161b22;
    border: 2px solid #30363d;
    border-radius: 20px;
    color: #8b949e;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    transition: all 0.15s;
    font-weight: bold;
  }
  .stage-pill:hover { border-color: #58a6ff; color: #c9d1d9; }
  .stage-pill.active { background: #1f2937; border-color: #58a6ff; color: #58a6ff; }

  /* Sub-bar: exercise type tabs */
  .sub-bar { display: flex; gap: 0.4rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .sub-tab {
    padding: 0.4rem 0.85rem;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #8b949e;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.8rem;
    transition: all 0.15s;
  }
  .sub-tab:hover { border-color: #58a6ff; color: #c9d1d9; }
  .sub-tab.active { background: #1f2937; border-color: #58a6ff; color: #58a6ff; }

  /* Exercise panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Stats bar */
  .stats {
    display: flex; gap: 1.5rem; margin-bottom: 1rem;
    padding: 0.75rem 1rem;
    background: #161b22; border: 1px solid #30363d; border-radius: 6px;
    font-size: 0.8rem; max-width: 800px;
  }
  .stat-label { color: #8b949e; }
  .stat-val { color: #58a6ff; font-weight: bold; }
  .stat-val.good { color: #3fb950; }
  .stat-val.bad { color: #f85149; }

  /* Progress bar */
  .progress-bar {
    height: 4px; background: #21262d; border-radius: 2px;
    margin-bottom: 1rem; max-width: 800px;
  }
  .progress-fill {
    height: 100%; background: #58a6ff; border-radius: 2px;
    transition: width 0.3s;
  }

  /* Exercise card */
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    max-width: 800px;
  }
  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 1rem;
  }
  .difficulty {
    font-size: 0.7rem;
    padding: 0.2rem 0.5rem;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .difficulty.easy { background: #0d2818; color: #3fb950; border: 1px solid #238636; }
  .difficulty.medium { background: #2a1f00; color: #d29922; border: 1px solid #9e6a03; }
  .difficulty.hard { background: #300; color: #f85149; border: 1px solid #da3633; }

  .prompt-label { color: #8b949e; font-size: 0.75rem; margin-bottom: 0.4rem; }
  .command-line {
    background: #0d1117;
    border: 1px solid #30363d;
    padding: 0.75rem 1rem;
    border-radius: 6px;
    font-size: 1.1rem;
    color: #f0f6fc;
    margin-bottom: 1rem;
    white-space: pre;
    overflow-x: auto;
  }
  .command-line .space-dot { color: #484f58; }

  .instruction { color: #8b949e; font-size: 0.8rem; margin-bottom: 0.75rem; line-height: 1.5; }
  .instruction code {
    background: #0d1117; padding: 0.1rem 0.35rem; border-radius: 3px; color: #79c0ff; font-size: 0.8rem;
  }

  /* Input area */
  .token-input {
    width: 100%;
    background: #0d1117;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 0.6rem 0.8rem;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 1rem;
  }
  .token-input:focus { border-color: #58a6ff; }
  .token-input::placeholder { color: #484f58; }

  /* Multiple choice */
  .choices { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
  .choice-btn {
    background: #0d1117;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 0.6rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    text-align: left;
    transition: all 0.15s;
  }
  .choice-btn:hover { border-color: #58a6ff; background: #1a2332; }
  .choice-btn.correct { border-color: #3fb950; background: #0d2818; color: #3fb950; }
  .choice-btn.wrong { border-color: #f85149; background: #300; color: #f85149; }
  .choice-btn.reveal { border-color: #3fb950; background: #0d2818; color: #3fb950; opacity: 0.7; }
  .choice-btn.disabled { pointer-events: none; opacity: 0.6; }

  /* Buttons */
  .btn {
    padding: 0.5rem 1.2rem;
    border: 1px solid #30363d;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.8rem;
    transition: all 0.15s;
    background: #21262d;
    color: #c9d1d9;
  }
  .btn:hover { border-color: #58a6ff; }
  .btn-primary { background: #238636; border-color: #238636; color: #fff; }
  .btn-primary:hover { background: #2ea043; }
  .btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  /* Feedback */
  .feedback {
    padding: 0.75rem 1rem;
    border-radius: 6px;
    margin-bottom: 1rem;
    font-size: 0.85rem;
    display: none;
    line-height: 1.5;
  }
  .feedback.show { display: block; }
  .feedback.correct { background: #0d2818; border: 1px solid #238636; color: #3fb950; }
  .feedback.wrong { background: #300; border: 1px solid #da3633; color: #f85149; }

  .expected {
    margin-top: 0.5rem;
    padding: 0.5rem 0.75rem;
    background: #0d1117;
    border-radius: 4px;
    font-size: 0.8rem;
    color: #8b949e;
  }
  .expected strong { color: #c9d1d9; }

  /* Token display */
  .token-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.4rem; }
  .token-pill {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    font-size: 0.8rem;
  }
  .token-pill.word { background: #1f2937; color: #79c0ff; border: 1px solid #304a6e; }
  .token-pill.pipe { background: #2a1f00; color: #d29922; border: 1px solid #9e6a03; }
  .token-pill.redir { background: #1a0d2e; color: #bc8cff; border: 1px solid #6e40c9; }

  .hint-text {
    color: #8b949e;
    font-size: 0.75rem;
    margin-top: 0.3rem;
    margin-bottom: 0.5rem;
  }

  /* Cursor arrow for lexer state */
  .cursor-row {
    font-size: 1.1rem;
    color: #f85149;
    letter-spacing: 0;
    white-space: pre;
    margin-top: -0.3rem;
    margin-bottom: 0.5rem;
    padding: 0 1rem;
  }

  /* Segment pills */
  .seg-unquoted { background: #1f2937; color: #79c0ff; border: 1px solid #304a6e; }
  .seg-single { background: #1a2e1a; color: #3fb950; border: 1px solid #238636; }
  .seg-double { background: #2a1f00; color: #d29922; border: 1px solid #9e6a03; }
  .segment-pill {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    font-size: 0.8rem;
    margin: 0.15rem;
  }
  .segment-token-group {
    display: inline-flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.2rem;
    padding: 0.4rem 0.6rem;
    margin: 0.3rem 0;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
  }
  .segment-token-label {
    font-size: 0.7rem;
    color: #484f58;
    margin-right: 0.3rem;
    text-transform: uppercase;
  }
  .seg-legend {
    display: flex;
    gap: 1rem;
    margin: 0.75rem 0;
    font-size: 0.75rem;
    flex-wrap: wrap;
  }
  .seg-legend span { display: flex; align-items: center; gap: 0.3rem; }
  .seg-legend-swatch {
    display: inline-block;
    width: 12px; height: 12px;
    border-radius: 3px;
  }

  /* Env bar for expander */
  .env-bar {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 0.6rem 1rem;
    margin-bottom: 1rem;
    font-size: 0.78rem;
    color: #8b949e;
    max-width: 800px;
    overflow-x: auto;
    white-space: nowrap;
  }
  .env-bar strong { color: #bc8cff; }
  .env-bar .env-key { color: #d29922; }
  .env-bar .env-val { color: #79c0ff; }
</style>
</head>
<body>

<h1>Minishell Pipeline Training</h1>
<p class="subtitle">Master every stage of your shell &mdash; from raw text to execution.</p>

<!-- ===== STAGE PILLS ===== -->
<div class="stage-bar" id="stage-bar"></div>

<!-- ===== SUB-TABS ===== -->
<div class="sub-bar" id="sub-bar"></div>

<!-- ===== CONTENT AREA ===== -->
<div id="content-area"></div>

<script>
// =========================================================================
//  UTILITY FUNCTIONS
// =========================================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderTokenPills(tokens) {
  return tokens.map(t => {
    let cls = 'word';
    if (t === '|') cls = 'pipe';
    else if (['<','>','<<','>>'].includes(t)) cls = 'redir';
    const display = t === '' ? '(empty string)' : escapeHtml(t);
    return `<span class="token-pill ${cls}">${display}</span>`;
  }).join(' ');
}

function formatSegments(tokens) {
  const typeClass = { u: 'seg-unquoted', s: 'seg-single', d: 'seg-double' };
  return tokens.map((segs, i) => {
    const pills = segs.map(s => {
      const display = s.v === '' ? '(empty)' : escapeHtml(s.v);
      return `<span class="segment-pill ${typeClass[s.t]}">${s.t}:${display}</span>`;
    }).join('<span style="color:#484f58;margin:0 0.1rem">+</span>');
    return `<span class="segment-token-group"><span class="segment-token-label">T${i+1}</span>${pills}</span>`;
  }).join(' ');
}

function parseSegmentInput(str) {
  const tokens = str.split(',').map(tok => {
    const segs = tok.split('+').map(seg => {
      const trimmed = seg.trim();
      const colonIdx = trimmed.indexOf(':');
      if (colonIdx === -1) return { t: trimmed, v: '' };
      const t = trimmed.substring(0, colonIdx).trim();
      const v = trimmed.substring(colonIdx + 1);
      return { t, v };
    });
    return segs;
  });
  return tokens;
}

function segmentsEqual(a, b) {
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length; i++) {
    if (a[i].length !== b[i].length) return false;
    for (let j = 0; j < a[i].length; j++) {
      if (a[i][j].t !== b[i][j].t || a[i][j].v !== b[i][j].v) return false;
    }
  }
  return true;
}

function generateNumberChoices(correct, min, max) {
  const opts = new Set([correct]);
  let attempts = 0;
  while (opts.size < 4 && attempts < 100) {
    attempts++;
    let d = correct + Math.floor(Math.random() * 7) - 3;
    if (d >= min && d !== correct && d <= max) opts.add(d);
  }
  for (let f = 1; opts.size < 4; f++) {
    if (correct + f <= max && !opts.has(correct + f)) opts.add(correct + f);
    if (opts.size < 4 && correct - f >= min && !opts.has(correct - f)) opts.add(correct - f);
  }
  return [...opts].sort((a,b) => a - b);
}

function highlightCmd(cmd, ranges, color) {
  color = color || '#58a6ff';
  let html = '';
  for (let i = 0; i < cmd.length; i++) {
    let inHighlight = false;
    for (const r of ranges) {
      if (i >= r[0] && i <= r[1]) { inHighlight = true; break; }
    }
    const ch = escapeHtml(cmd[i]);
    if (inHighlight) {
      html += `<span style="background:${color}33;color:${color};border-bottom:2px solid ${color};font-weight:bold">${ch}</span>`;
    } else {
      html += `<span style="color:#484f58">${ch}</span>`;
    }
  }
  return html;
}

function highlightWord(cmd, word) {
  // Highlight a specific word/command in the command string
  const idx = cmd.indexOf(word);
  if (idx === -1) return escapeHtml(cmd);
  let html = '';
  for (let i = 0; i < cmd.length; i++) {
    const ch = escapeHtml(cmd[i]);
    if (i >= idx && i < idx + word.length) {
      html += `<span style="background:#58a6ff33;color:#58a6ff;border-bottom:2px solid #58a6ff;font-weight:bold">${ch}</span>`;
    } else {
      html += ch;
    }
  }
  return html;
}

// =========================================================================
//  EXERCISE DATA - LEXER
// =========================================================================

const tokenizeExercises = [
  { cmd: 'echo hello', tokens: ['echo','hello'], diff: 'easy' },
  { cmd: 'ls -l -a', tokens: ['ls','-l','-a'], diff: 'easy' },
  { cmd: 'cat Makefile', tokens: ['cat','Makefile'], diff: 'easy' },
  { cmd: '/bin/ls', tokens: ['/bin/ls'], diff: 'easy' },
  { cmd: 'echo hello world', tokens: ['echo','hello','world'], diff: 'easy' },
  { cmd: 'ls > out.txt', tokens: ['ls','>','out.txt'], diff: 'easy' },
  { cmd: 'cat < in.txt', tokens: ['cat','<','in.txt'], diff: 'easy' },
  { cmd: 'echo hello | wc -l', tokens: ['echo','hello','|','wc','-l'], diff: 'easy' },
  { cmd: 'echo "hello world"', tokens: ['echo','hello world'], diff: 'medium' },
  { cmd: "echo 'hello world'", tokens: ['echo','hello world'], diff: 'medium' },
  { cmd: 'echo ""', tokens: ['echo', ''], diff: 'medium' },
  { cmd: "echo ''", tokens: ['echo', ''], diff: 'medium' },
  { cmd: 'echo hello>out.txt', tokens: ['echo','hello','>','out.txt'], diff: 'medium' },
  { cmd: 'echo hello|wc', tokens: ['echo','hello','|','wc'], diff: 'medium' },
  { cmd: 'echo >> log.txt', tokens: ['echo','>>','log.txt'], diff: 'medium' },
  { cmd: '<< EOF cat', tokens: ['<<','EOF','cat'], diff: 'medium' },
  { cmd: 'grep "hello world" file.txt', tokens: ['grep','hello world','file.txt'], diff: 'medium' },
  { cmd: 'echo "$USER"', tokens: ['echo','$USER'], diff: 'medium' },
  { cmd: "echo '$USER'", tokens: ['echo','$USER'], diff: 'medium' },
  { cmd: 'echo hello   world', tokens: ['echo','hello','world'], diff: 'medium' },
  { cmd: 'cat < in > out', tokens: ['cat','<','in','>','out'], diff: 'medium' },
  { cmd: 'echo hel"lo wo"rld', tokens: ['echo','hello world'], diff: 'hard' },
  { cmd: "echo hel'lo wo'rld", tokens: ['echo','hello world'], diff: 'hard' },
  { cmd: 'echo "hello"world', tokens: ['echo','helloworld'], diff: 'hard' },
  { cmd: 'echo "hello"\'world\'', tokens: ['echo','helloworld'], diff: 'hard' },
  { cmd: "echo ''\"\"", tokens: ['echo',''], diff: 'hard' },
  { cmd: 'echo "|"', tokens: ['echo','|'], diff: 'hard' },
  { cmd: "echo '|' | cat", tokens: ['echo','|','|','cat'], diff: 'hard' },
  { cmd: 'echo ">"', tokens: ['echo','>'], diff: 'hard' },
  { cmd: 'echo a"b"c\'d\'e', tokens: ['echo','abcde'], diff: 'hard' },
  { cmd: '""', tokens: [''], diff: 'hard' },
  { cmd: 'cat<<EOF', tokens: ['cat','<<','EOF'], diff: 'hard' },
  { cmd: 'echo hello>>out|wc -l', tokens: ['echo','hello','>>','out','|','wc','-l'], diff: 'hard' },
  { cmd: '>out echo hello', tokens: ['>','out','echo','hello'], diff: 'hard' },
  { cmd: 'echo "hello   world"', tokens: ['echo','hello   world'], diff: 'hard' },
  { cmd: "echo 'he\"llo'", tokens: ['echo','he"llo'], diff: 'hard' },
  { cmd: 'echo "he\'llo"', tokens: ['echo',"he'llo"], diff: 'hard' },
  { cmd: 'echo "hello \\"world\\""', tokens: ['echo','hello "world"'], diff: 'hard' },
  { cmd: 'echo hello\\ world', tokens: ['echo','hello world'], diff: 'hard' },
  { cmd: 'echo hello\\|wc', tokens: ['echo','hello|wc'], diff: 'hard' },
  { cmd: 'echo \\"hello\\"', tokens: ['echo','"hello"'], diff: 'hard' },
  { cmd: "echo 'hello\\nworld'", tokens: ['echo','hello\\nworld'], diff: 'hard' },
  { cmd: 'echo "hello\\nworld"', tokens: ['echo','hello\\nworld'], diff: 'hard' },
  { cmd: 'echo >>>out', tokens: ['echo','>>','>','out'], diff: 'hard' },
  { cmd: 'echo $?', tokens: ['echo','$?'], diff: 'medium' },
  { cmd: 'echo $USER$HOME', tokens: ['echo','$USER$HOME'], diff: 'medium' },
  { cmd: '<< "EOF" cat', tokens: ['<<','EOF','cat'], diff: 'hard' },
  { cmd: "echo 'hello'\"world\"end", tokens: ['echo','helloworldend'], diff: 'hard' },
  { cmd: 'echo hello | cat | wc -l', tokens: ['echo','hello','|','cat','|','wc','-l'], diff: 'medium' },
  { cmd: '> > out', tokens: ['>','>','out'], diff: 'hard' },
  { cmd: 'echo "hello">"out.txt"', tokens: ['echo','hello','>','out.txt'], diff: 'hard' },
];

const countExercises = [
  { cmd: 'ls', count: 1, diff: 'easy' },
  { cmd: 'echo hello world', count: 3, diff: 'easy' },
  { cmd: 'echo "hello world"', count: 2, diff: 'easy' },
  { cmd: 'ls -l -a -h', count: 4, diff: 'easy' },
  { cmd: 'echo hello | wc -l', count: 5, diff: 'medium' },
  { cmd: 'cat < in > out', count: 5, diff: 'medium' },
  { cmd: 'echo hello>out', count: 4, diff: 'medium' },
  { cmd: 'echo hel"lo wo"rld', count: 2, diff: 'hard' },
  { cmd: "echo ''\"\"", count: 2, diff: 'hard' },
  { cmd: 'echo hello>>out|wc -l', count: 7, diff: 'hard' },
  { cmd: '""', count: 1, diff: 'hard' },
  { cmd: "echo 'hello'world", count: 2, diff: 'medium' },
  { cmd: 'echo a"b"c', count: 2, diff: 'hard' },
  { cmd: 'cat<<EOF', count: 3, diff: 'hard' },
  { cmd: 'echo "|" | cat', count: 4, diff: 'hard' },
  { cmd: 'echo hello\\ world', count: 2, diff: 'hard' },
  { cmd: 'echo hello\\|wc', count: 2, diff: 'hard' },
  { cmd: 'echo "hello \\"world\\""', count: 2, diff: 'hard' },
  { cmd: 'echo >>>out', count: 4, diff: 'hard' },
  { cmd: '> > out', count: 3, diff: 'hard' },
  { cmd: 'echo hello | cat | wc -l', count: 7, diff: 'medium' },
  { cmd: 'echo "hello">"out.txt"', count: 4, diff: 'hard' },
];

const spotExercises = [
  { cmd: 'echo hello', valid: true, reason: 'All tokens are well-formed.', diff: 'easy' },
  { cmd: 'echo "hello world', valid: false, reason: 'Unclosed double quote \u2014 the lexer reaches end of input still inside a quoted string.', diff: 'easy' },
  { cmd: "echo 'hello world", valid: false, reason: "Unclosed single quote.", diff: 'easy' },
  { cmd: 'echo ""', valid: true, reason: 'Empty quotes are valid \u2014 they produce an empty-string token.', diff: 'medium' },
  { cmd: 'echo "hello \'world"', valid: true, reason: "Single quote inside double quotes is just a literal character. The double quotes are properly closed.", diff: 'medium' },
  { cmd: "echo 'hello \"world'", valid: true, reason: "Double quote inside single quotes is just a literal character. The single quotes are properly closed.", diff: 'medium' },
  { cmd: "echo 'hello''world'", valid: true, reason: "Two properly closed single-quoted segments adjacent to each other. Perfectly valid \u2014 produces one token: helloworld.", diff: 'medium' },
  { cmd: 'echo "hello"\'', valid: false, reason: "The trailing single quote is never closed.", diff: 'hard' },
  { cmd: 'echo "it\'s a test"', valid: true, reason: "The single quote is inside double quotes, so it's just a literal character. The double quotes are properly closed.", diff: 'medium' },
  { cmd: 'echo hello"world', valid: false, reason: "The double quote opens but is never closed.", diff: 'medium' },
  { cmd: "echo 'hello'\"world\"", valid: true, reason: "Both the single-quoted and double-quoted segments are properly closed.", diff: 'hard' },
  { cmd: 'echo "hello \\"world"', valid: true, reason: 'Inside double quotes, \\" is an escaped double quote \u2014 it produces a literal " without closing the string. The lexer sees one quoted token with value: hello "world.', diff: 'hard' },
  { cmd: 'echo hello\\', valid: false, reason: 'Trailing backslash with nothing after it \u2014 the backslash expects a character to escape but finds end of input. This is a lexer error.', diff: 'hard' },
  { cmd: 'echo hello\\ world', valid: true, reason: 'The backslash escapes the space, making it literal. This produces two tokens: echo and hello world (space is part of the second token).', diff: 'hard' },
  { cmd: "echo 'hello\\nworld'", valid: true, reason: "Inside single quotes, backslash has no special meaning \u2014 it's just a literal character. The quotes are properly closed. Token value: hello\\nworld.", diff: 'hard' },
  { cmd: 'echo \'hello\' "world" | cat', valid: true, reason: 'All quotes are properly closed, pipe is valid.', diff: 'easy' },
  { cmd: 'echo "hello|world"', valid: true, reason: "The pipe is inside double quotes so it's a literal character. Quotes are properly closed.", diff: 'medium' },
  { cmd: 'echo >>>out', valid: true, reason: 'This is valid: >>> is parsed as >> (append operator) followed by > (redirect operator). Then out is a word. Four tokens: echo, >>, >, out.', diff: 'hard' },

// =========================================================================
//  ENGINE STATE
// =========================================================================
let currentStage = 0;
let currentType = 0;
const engineState = {}; // keyed by type id

function getState(typeId) {
  if (!engineState[typeId]) {
    const typeDef = findTypeDef(typeId);
    engineState[typeId] = {
      exercises: shuffle(typeDef.data),
      idx: 0,
      correct: 0,
      wrong: 0,
    };
  }
  return engineState[typeId];
}

function resetState(typeId) {
  const typeDef = findTypeDef(typeId);
  engineState[typeId] = {
    exercises: shuffle(typeDef.data),
    idx: 0,
    correct: 0,
    wrong: 0,
  };
}

function findTypeDef(typeId) {
  for (const s of stages) {
    for (const t of s.types) {
      if (t.id === typeId) return t;
    }
  }
  return null;
}

function findStageForType(typeId) {
  for (const s of stages) {
    for (const t of s.types) {
      if (t.id === typeId) return s;
    }
  }
  return null;
}

// =========================================================================
//  NAVIGATION
// =========================================================================

function buildStageBar() {
  const bar = document.getElementById('stage-bar');
  bar.innerHTML = stages.map((s, i) =>
    `<button class="stage-pill${i === currentStage ? ' active' : ''}" onclick="selectStage(${i})">${s.label}</button>`
  ).join('');
}

function buildSubBar() {
  const bar = document.getElementById('sub-bar');
  const stage = stages[currentStage];
  bar.innerHTML = stage.types.map((t, i) =>
    `<button class="sub-tab${i === currentType ? ' active' : ''}" onclick="selectType(${i})">${t.label}</button>`
  ).join('');
}

function selectStage(idx) {
  currentStage = idx;
  currentType = 0;
  buildStageBar();
  buildSubBar();
  renderExercise();
}

function selectType(idx) {
  currentType = idx;
  buildSubBar();
  renderExercise();
}

// =========================================================================
//  RENDER ENGINE
// =========================================================================

function renderExercise() {
  const stage = stages[currentStage];
  const typeDef = stage.types[currentType];
  const state = getState(typeDef.id);
  const area = document.getElementById('content-area');

  if (state.idx >= state.exercises.length) {
    area.innerHTML = `
      <div class="card" style="text-align:center">
        <h3 style="color:#3fb950;margin-bottom:1rem">Done!</h3>
        <p>Score: ${state.correct}/${state.exercises.length}</p>
        <br><button class="btn btn-primary" onclick="doReset()">Restart</button>
      </div>`;
    return;
  }

  const ex = state.exercises[state.idx];
  const total = state.exercises.length;
  const progress = (state.idx / total * 100);
  const isExpander = stage.id === 'expander' || typeDef.id === 'predict';

  let html = '';

  // Env bar for expander stage and predict output
  if (isExpander) {
    html += `<div class="env-bar"><strong>ENV:</strong> <span class="env-key">USER</span>=<span class="env-val">admin</span> &nbsp; <span class="env-key">HOME</span>=<span class="env-val">/Users/admin</span> &nbsp; <span class="env-key">PATH</span>=<span class="env-val">/usr/bin:/bin</span> &nbsp; <span class="env-key">?</span>=<span class="env-val">0</span> &nbsp; <span class="env-key">EMPTY</span>=<span class="env-val"></span> &nbsp; <span class="env-key">SPACES</span>=<span class="env-val">hello world</span> &nbsp; <span class="env-key">GREETING</span>=<span class="env-val">hello</span></div>`;
  }

  // Stats bar
  html += `<div class="stats">
    <span><span class="stat-label">Exercise </span><span class="stat-val">${state.idx + 1}</span><span class="stat-label"> / </span><span class="stat-val">${total}</span></span>
    <span><span class="stat-label">Correct: </span><span class="stat-val good">${state.correct}</span></span>
    <span><span class="stat-label">Wrong: </span><span class="stat-val bad">${state.wrong}</span></span>
  </div>`;

  // Progress bar
  html += `<div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>`;

  // Card
  html += `<div class="card"><div class="card-header"><span class="prompt-label">${getPromptLabel(typeDef, ex)}</span><span class="difficulty ${ex.diff || 'medium'}">${(ex.diff || 'medium').toUpperCase()}</span></div>`;

  // Content based on type
  html += renderExerciseContent(typeDef, ex, state);

  // Feedback
  html += `<div class="feedback" id="feedback"></div>`;

  // Buttons
  html += `<div class="btn-group">`;
  if (needsSubmitButton(typeDef)) {
    html += `<button class="btn btn-primary" id="submit-btn" onclick="doCheck()">Check</button>`;
  }
  html += `<button class="btn" id="next-btn" onclick="doNext()" style="display:none">Next &rarr;</button>`;
  html += `<button class="btn" onclick="doReset()">Shuffle &amp; Reset</button>`;
  html += `</div></div>`;

  area.innerHTML = html;

  // Focus input if needed
  const inp = document.getElementById('answer-input');
  if (inp) {
    inp.focus();
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (!inp.disabled) doCheck();
        else doNext();
      }
    });
  }
}

function getPromptLabel(typeDef, ex) {
  const labels = {
    tokenize: 'TOKENIZE THIS COMMAND',
    count: 'HOW MANY TOKENS?',
    spot: 'CAN THE LEXER TOKENIZE THIS?',
    boundary: 'SAME TOKEN OR DIFFERENT TOKENS?',
    state: 'WHAT STATE IS THE LEXER IN AT THE ARROW?',
    transition: 'WHAT STATE DOES THE LEXER TRANSITION TO?',
    segment: 'IDENTIFY THE SEGMENTS',
    segcount: 'HOW MANY SEGMENTS IN THE HIGHLIGHTED TOKEN?',
    expand: 'WILL THE HIGHLIGHTED $VAR BE EXPANDED?',
    pvalid: 'IS THIS SYNTAX VALID?',
    cmdcount: 'HOW MANY SIMPLE COMMANDS?',
    redirect: ex.highlight ? `WHERE IS ${ex.highlight.toUpperCase()}'S STDIN AND STDOUT?` : 'WHERE ARE STDIN AND STDOUT?',
    expandit: 'WHAT IS THE EXPANDED VALUE?',
    wordcount: 'HOW MANY WORDS AFTER EXPANSION?',
    quoterem: 'WHAT IS THE VALUE AFTER QUOTE REMOVAL?',
    forkcount: 'HOW MANY FORKS?',
    fdwiring: ex.highlight ? `WHERE IS ${ex.highlight.toUpperCase()}'S STDIN AND STDOUT?` : 'WHERE ARE STDIN AND STDOUT?',
    exitstatus: 'WHAT IS $? AFTER THIS COMMAND?',
    predict: 'WHAT IS THE OUTPUT?',
    whichstage: 'AT WHICH STAGE DOES THIS HAPPEN?',
  };
  return labels[typeDef.id] || typeDef.label.toUpperCase();
}

function needsSubmitButton(typeDef) {
  return typeDef.kind === 'text_input';
}

function renderExerciseContent(typeDef, ex, state) {
  let html = '';
  const tid = typeDef.id;

  // === TOKENIZE ===
  if (tid === 'tokenize') {
    html += `<div class="command-line">${escapeHtml(ex.cmd)}</div>`;
    html += `<p class="instruction">List the tokens separated by commas. Use the token value only (quotes are consumed by the lexer, not part of the token value). Operators are literal: <code>|</code> <code>&lt;</code> <code>&gt;</code> <code>&lt;&lt;</code> <code>&gt;&gt;</code></p>`;
    html += `<p class="hint-text">Example: for <code>echo hello</code> type: <code>echo, hello</code></p>`;
    html += `<input class="token-input" id="answer-input" placeholder="token1, token2, token3, ..." autocomplete="off">`;
  }
  // === TOKEN COUNT ===
  else if (tid === 'count') {
    html += `<div class="command-line">${escapeHtml(ex.cmd)}</div>`;
    const opts = generateNumberChoices(ex.count, 1, 20);
    html += `<div class="choices">${opts.map(n => `<button class="choice-btn" onclick="doChoiceCheck(this,${n})">${n}</button>`).join('')}</div>`;
  }
  // === SPOT ERROR (lexer) ===
  else if (tid === 'spot') {
    html += `<div class="command-line">${escapeHtml(ex.cmd)}</div>`;
    html += `<p class="instruction">Is this input valid for the lexer to fully tokenize, or does it contain a lexer-level error (like unclosed quotes)?</p>`;
    html += `<div class="choices">
      <button class="choice-btn" onclick="doBinaryCheck(this,true)">Valid \u2014 lexer can tokenize this</button>
      <button class="choice-btn" onclick="doBinaryCheck(this,false)">Error \u2014 lexer cannot fully tokenize this</button>
    </div>`;
  }
  // === TOKEN BOUNDARY ===
  else if (tid === 'boundary') {
    html += `<p class="instruction" style="margin-bottom:1rem">Do the highlighted characters belong to the <strong>same single token</strong>, or are they <strong>separate tokens</strong>?</p>`;
    const colors = ['#58a6ff','#f0883e','#bc8cff'];
    let cmdHtml = '';
    for (let i = 0; i < ex.cmd.length; i++) {
      let inHl = false, hIdx = -1;
      for (let h = 0; h < ex.highlight.length; h++) {
        if (i >= ex.highlight[h][0] && i <= ex.highlight[h][1]) { inHl = true; hIdx = h; break; }
      }
      const ch = escapeHtml(ex.cmd[i]);
      if (inHl) {
        const c = colors[hIdx % colors.length];
        cmdHtml += `<span style="background:${c}33;color:${c};border-bottom:2px solid ${c};font-weight:bold">${ch}</span>`;
      } else {
        cmdHtml += `<span style="color:#484f58">${ch}</span>`;
      }
    }
    html += `<div class="command-line">${cmdHtml}</div>`;
    html += `<div class="choices">
      <button class="choice-btn" onclick="doBinaryCheck(this,'same')">Same token \u2014 they merge together</button>
      <button class="choice-btn" onclick="doBinaryCheck(this,'separate')">Separate tokens \u2014 there is a boundary</button>
    </div>`;
  }
  // === LEXER STATE ===
  else if (tid === 'state') {
    let cmdHtml = '';
    for (let i = 0; i < ex.cmd.length; i++) {
      const ch = escapeHtml(ex.cmd[i]);
      if (i === ex.pos) {
        cmdHtml += `<span style="background:#58a6ff33;color:#58a6ff;border-bottom:2px solid #58a6ff;font-weight:bold">${ch}</span>`;
      } else {
        cmdHtml += ch;
      }
    }
    html += `<div class="command-line">${cmdHtml}</div>`;
    let arrow = '';
    for (let i = 0; i < ex.pos; i++) arrow += ' ';
    arrow += '\u2191';
    html += `<div class="cursor-row">${arrow}</div>`;
    html += `<p class="instruction">The arrow points at a character position. What state is the lexer in when it reaches that character?</p>`;
    html += `<div class="choices">${stageLabels.map(s => `<button class="choice-btn" onclick="doLabelCheck(this,'${s}')">${s}</button>`).join('')}</div>`;
  }
  // === STATE TRANSITION ===
  else if (tid === 'transition') {
    let charDisplay = ex.char === ' ' ? '(space)' : ex.char === '\\' ? '\\' : escapeHtml(ex.char);
    let scenario = `Current state: <strong>${ex.from}</strong><br>Character read: <strong>${charDisplay}</strong>`;
    if (ex.charAfter) {
      let afterDisplay = ex.charAfter === '\\' ? '\\\\' : escapeHtml(ex.charAfter);
      scenario += `<br><span style="color:#8b949e;font-size:0.85rem">Next char (peek): <strong>${afterDisplay}</strong></span>`;
    }
    if (ex.charContext) {
      scenario += `<br><span style="color:#8b949e;font-size:0.85rem">Context: ${escapeHtml(ex.charContext)}</span>`;
    }
    html += `<div class="command-line">${scenario}</div>`;
    html += `<div class="choices">${stageLabels.map(s => `<button class="choice-btn" onclick="doLabelCheck(this,'${s}')">${s}</button>`).join('')}</div>`;
  }
  // === SEGMENT SPOTTER ===
  else if (tid === 'segment') {
    html += `<div class="command-line">${escapeHtml(ex.cmd)}</div>`;
    html += `<div class="seg-legend">
      <span><span class="seg-legend-swatch" style="background:#304a6e"></span> unquoted</span>
      <span><span class="seg-legend-swatch" style="background:#238636"></span> single-quoted</span>
      <span><span class="seg-legend-swatch" style="background:#9e6a03"></span> double-quoted</span>
    </div>`;
    html += `<p class="instruction">For each token, list its segments with their types. Format: <code>type:value</code> separated by <code>+</code> for segments within a token, and <code>,</code> between tokens. Types: <code>u</code> (unquoted), <code>s</code> (single-quoted), <code>d</code> (double-quoted).</p>`;
    html += `<p class="hint-text">Example: <code>hel"lo wo"rld</code> &rarr; <code>u:hel + d:lo wo + u:rld</code></p>`;
    html += `<input class="token-input" id="answer-input" placeholder="u:echo, u:hel + d:lo wo + u:rld" autocomplete="off">`;
  }
  // === SEGMENT COUNT ===
  else if (tid === 'segcount') {
    html += `<div class="command-line">${highlightCmd(ex.cmd, [[ex.hl[0], ex.hl[1]]], '#58a6ff')}</div>`;
    html += `<p class="instruction">The highlighted portion is one token. How many distinct segments (unquoted, single-quoted, double-quoted) make it up?</p>`;
    const opts = generateNumberChoices(ex.count, 1, 7);
    html += `<div class="choices">${opts.map(n => `<button class="choice-btn" onclick="doChoiceCheck(this,${n})">${n}</button>`).join('')}</div>`;
  }
  // === WILL IT EXPAND? ===
  else if (tid === 'expand') {
    html += `<div class="command-line">${highlightCmd(ex.cmd, [[ex.hl[0], ex.hl[1]]], '#d29922')}</div>`;
    html += `<p class="instruction">The expander processes tokens after the lexer. It expands <code>$VAR</code> in <strong>unquoted</strong> and <strong>double-quoted</strong> segments, but NOT in <strong>single-quoted</strong> segments. Will the highlighted <code>$VAR</code> be expanded?</p>`;
    html += `<div class="choices">
      <button class="choice-btn" onclick="doBinaryCheck(this,true)">Yes \u2014 it will be expanded</button>
      <button class="choice-btn" onclick="doBinaryCheck(this,false)">No \u2014 it stays literal</button>
    </div>`;
  }
  // === PARSER VALID? ===
  else if (tid === 'pvalid') {
    html += `<div class="command-line">${escapeHtml(ex.cmd)}</div>`;
    html += `<p class="instruction">After the lexer produces tokens, does the parser accept this command as syntactically valid?</p>`;
    html += `<div class="choices">
      <button class="choice-btn" onclick="doBinaryCheck(this,true)">Valid \u2014 parser accepts this</button>
      <button class="choice-btn" onclick="doBinaryCheck(this,false)">Invalid \u2014 syntax error</button>
    </div>`;
  }
  // === CMD COUNT ===
  else if (tid === 'cmdcount') {
    html += `<div class="command-line">${escapeHtml(ex.cmd)}</div>`;
    html += `<p class="instruction">How many simple commands (executable units separated by pipes) are in this pipeline?</p>`;
    const opts = generateNumberChoices(ex.count, 1, 10);
    html += `<div class="choices">${opts.map(n => `<button class="choice-btn" onclick="doChoiceCheck(this,${n})">${n}</button>`).join('')}</div>`;
  }
  // === REDIRECT TARGET / FD WIRING ===
  else if (tid === 'redirect' || tid === 'fdwiring') {
    if (ex.highlight) {
      html += `<div class="command-line">${highlightWord(ex.cmd, ex.highlight)}</div>`;
      html += `<p class="instruction">For the highlighted command <strong>${escapeHtml(ex.highlight)}</strong>, where are stdin and stdout connected?</p>`;
    } else {
      html += `<div class="command-line">${escapeHtml(ex.cmd)}</div>`;
      html += `<p class="instruction">Where are stdin and stdout connected for this command?</p>`;
    }
    const opts = ex.options.map(o => `<button class="choice-btn" onclick="doLabelCheck(this,'${escapeHtml(o)}')">${escapeHtml(o)}</button>`).join('');
    html += `<div class="choices">${opts}</div>`;
  }
  // === EXPAND IT ===
  else if (tid === 'expandit') {
    html += `<div class="command-line">${escapeHtml(ex.input)}</div>`;
    html += `<p class="instruction">Given the environment variables above, what is the expanded value of this token? (Type the result after expansion. For empty string, type nothing.)</p>`;
    html += `<input class="token-input" id="answer-input" placeholder="expanded value..." autocomplete="off">`;
  }
  // === WORD COUNT ===
  else if (tid === 'wordcount') {
    html += `<div class="command-line">${escapeHtml(ex.input)}</div>`;
    html += `<p class="instruction">After variable expansion and word splitting, how many words does this produce?</p>`;
    const opts = generateNumberChoices(ex.count, 0, 10);
    html += `<div class="choices">${opts.map(n => `<button class="choice-btn" onclick="doChoiceCheck(this,${n})">${n}</button>`).join('')}</div>`;
  }
  // === QUOTE REMOVAL ===
  else if (tid === 'quoterem') {
    html += `<div class="command-line">${escapeHtml(ex.input)}</div>`;
    html += `<p class="instruction">After quote removal, what is the final value? (For empty string, type <code>(empty string)</code>.)</p>`;
    html += `<input class="token-input" id="answer-input" placeholder="value after quote removal..." autocomplete="off">`;
  }
  // === FORK COUNT ===
  else if (tid === 'forkcount') {
    html += `<div class="command-line">${escapeHtml(ex.cmd)}</div>`;
    html += `<p class="instruction">How many child processes (forks) does the shell create? Builtins (echo, cd, pwd, export, unset, env, exit) do NOT fork unless they are in a pipeline.</p>`;
    const opts = generateNumberChoices(ex.count, 0, 10);
    html += `<div class="choices">${opts.map(n => `<button class="choice-btn" onclick="doChoiceCheck(this,${n})">${n}</button>`).join('')}</div>`;
  }
  // === EXIT STATUS ===
  else if (tid === 'exitstatus') {
    html += `<div class="command-line">${escapeHtml(ex.cmd)}</div>`;
    html += `<p class="instruction">What is the value of $? (exit status) after this command finishes?</p>`;
    const opts = generateNumberChoices(ex.status, 0, 255);
    html += `<div class="choices">${opts.map(n => `<button class="choice-btn" onclick="doChoiceCheck(this,${n})">${n}</button>`).join('')}</div>`;
  }
  // === PREDICT OUTPUT ===
  else if (tid === 'predict') {
    html += `<div class="command-line">${escapeHtml(ex.cmd)}</div>`;
    html += `<p class="instruction">Given the environment variables above, what is the exact output printed to stdout?</p>`;
    html += `<input class="token-input" id="answer-input" placeholder="expected output..." autocomplete="off">`;
  }
  // === WHICH STAGE ===
  else if (tid === 'whichstage') {
    html += `<div class="command-line" style="font-size:0.95rem;color:#c9d1d9">${escapeHtml(ex.question)}</div>`;
    html += `<p class="instruction">At which stage of the shell pipeline does this happen?</p>`;
    html += `<div class="choices">${pipelineStageLabels.map(s => `<button class="choice-btn" onclick="doLabelCheck(this,'${s}')">${s}</button>`).join('')}</div>`;
  }

  return html;
}

// =========================================================================
//  CHECK FUNCTIONS
// =========================================================================

function getCurrentTypeDef() {
  return stages[currentStage].types[currentType];
}

function getCurrentState() {
  return getState(getCurrentTypeDef().id);
}

function showFeedback(correct, message) {
  const fb = document.getElementById('feedback');
  fb.className = correct ? 'feedback show correct' : 'feedback show wrong';
  fb.innerHTML = message;
}

function disableAllChoices() {
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.add('disabled'));
}

function showNext() {
  const sb = document.getElementById('submit-btn');
  if (sb) sb.style.display = 'none';
  document.getElementById('next-btn').style.display = '';
}

function doCheck() {
  const typeDef = getCurrentTypeDef();
  const state = getCurrentState();
  const ex = state.exercises[state.idx];
  const inp = document.getElementById('answer-input');
  const val = inp.value;

  let correct = false;
  let feedbackMsg = '';

  if (typeDef.id === 'tokenize') {
    const userTokens = val.split(',').map(s => s.trim());
    correct = userTokens.length === ex.tokens.length && userTokens.every((t, i) => t === ex.tokens[i]);
    if (correct) {
      feedbackMsg = 'Correct!';
    } else {
      feedbackMsg = `Wrong.<div class="expected"><strong>Expected ${ex.tokens.length} token(s):</strong><div class="token-list">${renderTokenPills(ex.tokens)}</div></div>`;
    }
  }
  else if (typeDef.id === 'segment') {
    const userParsed = parseSegmentInput(val);
    correct = segmentsEqual(userParsed, ex.tokens);
    if (correct) {
      feedbackMsg = `Correct! ${formatSegments(ex.tokens)}`;
    } else {
      feedbackMsg = `Wrong.<div class="expected"><strong>Expected:</strong><div style="margin-top:0.4rem">${formatSegments(ex.tokens)}</div></div>`;
    }
  }
  else if (typeDef.id === 'expandit') {
    correct = val === ex.result;
    feedbackMsg = correct ? `Correct! ${escapeHtml(ex.explanation)}` : `Wrong. Expected: <strong>${escapeHtml(ex.result || '(empty)')}</strong>. ${escapeHtml(ex.explanation)}`;
  }
  else if (typeDef.id === 'quoterem') {
    const expected = ex.result;
    correct = val === expected || (expected === '(empty string)' && val === '');
    feedbackMsg = correct ? `Correct! ${escapeHtml(ex.explanation)}` : `Wrong. Expected: <strong>${escapeHtml(expected)}</strong>. ${escapeHtml(ex.explanation)}`;
  }
  else if (typeDef.id === 'predict') {
    correct = val === ex.output;
    feedbackMsg = correct ? `Correct! ${escapeHtml(ex.explanation)}` : `Wrong. Expected: <strong>${escapeHtml(ex.output)}</strong>. ${escapeHtml(ex.explanation)}`;
  }

  if (correct) state.correct++; else state.wrong++;
  inp.disabled = true;
  showFeedback(correct, feedbackMsg);
  showNext();
}

function doChoiceCheck(btn, chosen) {
  const typeDef = getCurrentTypeDef();
  const state = getCurrentState();
  const ex = state.exercises[state.idx];
  disableAllChoices();

  let correctVal;
  let explanation = '';
  let correct = false;

  if (typeDef.id === 'count') {
    correctVal = ex.count; explanation = '';
  } else if (typeDef.id === 'segcount') {
    correctVal = ex.count; explanation = ex.explanation;
  } else if (typeDef.id === 'cmdcount') {
    correctVal = ex.count; explanation = '';
  } else if (typeDef.id === 'wordcount') {
    correctVal = ex.count; explanation = ex.explanation;
  } else if (typeDef.id === 'forkcount') {
    correctVal = ex.count; explanation = ex.explanation;
  } else if (typeDef.id === 'exitstatus') {
    correctVal = ex.status; explanation = ex.explanation;
    if (ex.altStatus && ex.altStatus.includes(chosen)) {
      correct = true;
    }
  }

  if (chosen === correctVal) correct = true;

  document.querySelectorAll('.choice-btn').forEach(b => {
    const bVal = parseInt(b.textContent);
    if (bVal === correctVal) b.classList.add('correct');
  });

  if (correct) {
    state.correct++;
    btn.classList.add('correct');
    showFeedback(true, explanation ? `Correct! ${escapeHtml(explanation)}` : 'Correct!');
  } else {
    state.wrong++;
    btn.classList.add('wrong');
    showFeedback(false, explanation ? `Wrong \u2014 the answer is ${correctVal}. ${escapeHtml(explanation)}` : `Wrong \u2014 the answer is ${correctVal}.`);
  }
  showNext();
}

function doBinaryCheck(btn, chosen) {
  const typeDef = getCurrentTypeDef();
  const state = getCurrentState();
  const ex = state.exercises[state.idx];
  disableAllChoices();

  let correctVal, explanation;

  if (typeDef.id === 'spot') {
    correctVal = ex.valid; explanation = ex.reason;
  } else if (typeDef.id === 'boundary') {
    correctVal = ex.answer; explanation = ex.explanation;
  } else if (typeDef.id === 'expand') {
    correctVal = ex.expands; explanation = ex.explanation;
  } else if (typeDef.id === 'pvalid') {
    correctVal = ex.valid; explanation = ex.reason;
  }

  const correct = chosen === correctVal;
  if (correct) state.correct++; else state.wrong++;

  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => {
    if (typeDef.id === 'spot' || typeDef.id === 'pvalid') {
      const bVal = b.textContent.includes('Valid') || b.textContent.includes('accepts');
      if (bVal === correctVal) b.classList.add(correct ? 'correct' : 'reveal');
    } else if (typeDef.id === 'boundary') {
      const bVal = b.textContent.startsWith('Same') ? 'same' : 'separate';
      if (bVal === correctVal) b.classList.add(correct ? 'correct' : 'reveal');
    } else if (typeDef.id === 'expand') {
      const bVal = b.textContent.startsWith('Yes');
      if (bVal === correctVal) b.classList.add(correct ? 'correct' : 'reveal');
    }
  });

  if (correct) {
    btn.classList.add('correct');
    showFeedback(true, `Correct! ${escapeHtml(explanation)}`);
  } else {
    btn.classList.add('wrong');
    showFeedback(false, `Wrong. ${escapeHtml(explanation)}`);
  }
  showNext();
}

function doLabelCheck(btn, chosen) {
  const typeDef = getCurrentTypeDef();
  const state = getCurrentState();
  const ex = state.exercises[state.idx];
  disableAllChoices();

  let correctVal, explanation;

  if (typeDef.id === 'state') {
    correctVal = ex.state; explanation = ex.explanation;
  } else if (typeDef.id === 'transition') {
    correctVal = ex.to; explanation = ex.explanation;
  } else if (typeDef.id === 'redirect' || typeDef.id === 'fdwiring') {
    correctVal = ex.answer; explanation = ex.explanation;
  } else if (typeDef.id === 'whichstage') {
    correctVal = ex.answer; explanation = ex.explanation;
  }

  const correct = chosen === correctVal;
  if (correct) state.correct++; else state.wrong++;

  document.querySelectorAll('.choice-btn').forEach(b => {
    if (b.textContent === correctVal || b.textContent === escapeHtml(correctVal) ||
        escapeHtml(b.textContent) === escapeHtml(correctVal)) {
      b.classList.add('correct');
    }
  });

  if (correct) {
    btn.classList.add('correct');
    showFeedback(true, `Correct! ${escapeHtml(explanation)}`);
  } else {
    btn.classList.add('wrong');
    showFeedback(false, `Wrong. ${escapeHtml(explanation)}`);
  }
  showNext();
}

function doNext() {
  const state = getCurrentState();
  state.idx++;
  renderExercise();
}

function doReset() {
  const typeDef = getCurrentTypeDef();
  resetState(typeDef.id);
  renderExercise();
}

// =========================================================================
//  INIT
// =========================================================================
buildStageBar();
buildSubBar();
renderExercise();
</script>
